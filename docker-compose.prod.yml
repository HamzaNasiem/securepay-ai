version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: securepay-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/hamzanasiem/securepay-ai/backend:latest
    container_name: securepay-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - VAULT_DB_PATH=vault.db
      - FIREWORKS_BASE_URL=https://api.fireworks.ai/inference/v1
      - FIREWORKS_MODEL=accounts/fireworks/models/gemma-3-27b-it
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/hamzanasiem/securepay-ai/frontend:latest
    container_name: securepay-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
